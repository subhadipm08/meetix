worker_processes auto;
worker_rlimit_nofile 2048;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ---- Basic Settings ----
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;  # Hide Nginx version

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Logging ----
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---- Gzip Compression ----
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss;

    # ---- Rate Limiting ----
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    # ---- Upstream: Backend Server Instances ----
    upstream meetix_backend {
        # ip_hash ensures the same client always hits the same server
        # (required for Socket.io sticky sessions)
        ip_hash;

        server meetix-server-1:8000;
        server meetix-server-2:8000;
    }

    # ---- HTTP → HTTPS Redirect ----
    server {
        listen 80;
        server_name meetixchat.online www.meetixchat.online;

        # Certbot ACME challenge (must be accessible over HTTP)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS Server ----
    server {
        listen 443 ssl;
        http2 on;
        server_name meetixchat.online www.meetixchat.online;

        # ---- SSL Certificates (managed by Certbot) ----
        ssl_certificate     /etc/letsencrypt/live/meetixchat.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/meetixchat.online/privkey.pem;

        # ---- SSL Security Settings ----
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ---- Security Headers ----
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---- API Proxy ----
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://meetix_backend;
            proxy_http_version 1.1;

            # Proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # ---- Socket.io WebSocket Proxy ----
        location /socket.io/ {
            proxy_pass http://meetix_backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Proxy headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout for persistent WebSocket connections
            proxy_connect_timeout 7d;
            proxy_send_timeout    7d;
            proxy_read_timeout    7d;
        }

        # ---- Health Check Endpoint ----
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
