services:
  # ===========================
  # Data Services
  # ===========================
  meetix-mongo:
    image: mongo:7.0
    container_name: meetix-mongo
    restart: unless-stopped
    volumes:
      - meetix-mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=${MONGO_DB_NAME}
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_DB_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_DB_PASSWORD}
    networks:
      - meetix-network
    # Only expose to host for debugging — remove in hardened production
    # ports:
    #   - "127.0.0.1:27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  meetix-redis:
    image: redis:7.2-alpine
    container_name: meetix-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - meetix-redis-data:/data
    networks:
      - meetix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 192M

  # ===========================
  # Backend Server Instances
  # ===========================
  meetix-server-1:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meetix-server-1
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      meetix-mongo:
        condition: service_healthy
      meetix-redis:
        condition: service_healthy
    networks:
      - meetix-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/v1/stats').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M

  meetix-server-2:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: meetix-server-2
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      - NODE_ENV=production
    depends_on:
      meetix-mongo:
        condition: service_healthy
      meetix-redis:
        condition: service_healthy
    networks:
      - meetix-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/api/v1/stats').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 384M

  # ===========================
  # Nginx Reverse Proxy + SSL
  # ===========================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: meetix-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - meetix-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ===========================
  # Certbot Auto-Renewal
  # ===========================
  certbot:
    image: certbot/certbot
    container_name: meetix-certbot
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
      - ./nginx/certbot-entrypoint.sh:/opt/certbot-entrypoint.sh:ro
    entrypoint: /bin/sh
    command: /opt/certbot-entrypoint.sh
    deploy:
      resources:
        limits:
          memory: 64M

# ===========================
# Volumes
# ===========================
volumes:
  meetix-mongo-data:
    driver: local
  meetix-redis-data:
    driver: local

# ===========================
# Networks
# ===========================
networks:
  meetix-network:
    driver: bridge
